<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  position:relative;
  background:#08090c;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  color:#f2f3f5;
  display:flex;align-items:center;
}
.glow{
  position:absolute;top:-220px;left:8%;
  width:900px;height:600px;
  background:radial-gradient(ellipse at center,rgba(124,92,255,.4),transparent 60%);
  filter:blur(40px);
}
.dots{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.06) 1.5px,transparent 1.5px);
  background-size:34px 34px;
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 25%,black 70%,transparent 100%);
}
.left{position:relative;z-index:2;padding:0 0 0 80px;width:62%}
.brand{
  font-size:96px;font-weight:800;letter-spacing:-4px;line-height:1;
  background:linear-gradient(135deg,#7c5cff,#5ce1ff);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:28px;
}
.headline{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:22px}
.headline .g{background:linear-gradient(135deg,#7c5cff,#5ce1ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-size:25px;color:#a0a5af;line-height:1.4;max-width:560px}
.chips{display:flex;gap:14px;margin-top:34px}
.chip{
  font-size:19px;font-weight:600;color:#d6d9e0;
  padding:10px 20px;border-radius:100px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);
}
.right{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center}
.phone{
  width:300px;background:#0c0e13;border:1px solid rgba(255,255,255,.12);
  border-radius:36px;padding:16px 14px;
  box-shadow:0 40px 100px rgba(124,92,255,.35),inset 0 1px 0 rgba(255,255,255,.06);
  transform:rotate(4deg);
}
.ph-head{display:flex;align-items:center;gap:11px;padding:6px 6px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.ph-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c5cff,#5ce1ff);color:#0b0b10;font-weight:800;font-size:20px;display:flex;align-items:center;justify-content:center}
.ph-name{font-size:16px;font-weight:700}
.ph-status{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:5px}
.ph-status::before{content:"";width:7px;height:7px;border-radius:50%;background:#4ade80}
.ph-body{padding:16px 4px 6px;display:flex;flex-direction:column;gap:12px}
.m{max-width:82%;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.4}
.m-bot{align-self:flex-start;background:rgba(255,255,255,.08);border-bottom-left-radius:6px}
.m-user{align-self:flex-end;background:linear-gradient(135deg,#7c5cff,#5ce1ff);color:#0b0b10;font-weight:500;border-bottom-right-radius:6px}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <div class="left">
    <div class="brand">COOP</div>
    <div class="headline">Боты не дают клиентам<br><span class="g">уходить к конкурентам</span></div>
    <div class="sub">Принимают заказы и записи 24/7 в WhatsApp, Instagram и Telegram</div>
    <div class="chips">
      <div class="chip">WhatsApp</div>
      <div class="chip">Instagram</div>
      <div class="chip">Telegram</div>
    </div>
  </div>
  <div class="right">
    <div class="phone">
      <div class="ph-head">
        <div class="ph-av">C</div>
        <div>
          <div class="ph-name">COOP Бот</div>
          <div class="ph-status">онлайн</div>
        </div>
      </div>
      <div class="ph-body">
        <div class="m m-bot">Здравствуйте! 👋 Чем могу помочь?</div>
        <div class="m m-user">Хочу заказать доставку</div>
        <div class="m m-bot">Готово ✅ Сумма 4 200 ₸. Передаю админу!</div>
      </div>
    </div>
  </div>
</body>
</html>
